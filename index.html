<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/main.css">
    <title>Nested Grid & Flexbox</title>
</head>
<body>
    <h1 class="visually-hidden">Nested Grid & Flexbox Example</h1>
    
    <div class="light-blue">
        <!-- Header -->
        <header class="grid-con center-grid-con">            
        
            <!-- Hamburger Menu -->
            <div id="burger-btn" class="col-span-1">
                    <img src="images/icon-burger.svg" alt="Hamburger Menu">
            </div>

            <!-- Logo -->
            <div id="logo-head" class="col-start-2 col-end-4 m-col-span-3">
                <img src="images/orbitz-logo.svg" alt="Orbitz Logo">
            </div>

            <!-- Header Icons -->
            <div id="header-icons" class="col-span-1 m-col-start-11 m-col-end-13">
                <img id="search" src="images/icon-header-search.svg" alt="Search Icon">
                <img id="cart" src="images/icon-header-cart.svg" alt="Shopping Cart Icon">
            </div>    
            
            <!-- Main Nav -->
            <nav id="main-nav" class="col-span-full m-col-start-4 m-col-end-11">
                <h2 class="visually-hidden">Main Navigation</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>
    </div>

    
    <main>
        <!-- Hero Image -->
        <div class="full-width-grid-con">
            <img
            sizes="100vw"
            srcset="
            images/products-hero_n46h6h_c_scale,w_412.png 412w,
            images/products-hero_n46h6h_c_scale,w_811.png 811w,
            images/products-hero_n46h6h_c_scale,w_1126.png 1126w,
            images/products-hero_n46h6h_c_scale,w_1406.png 1406w,
            images/products-hero_n46h6h_c_scale,w_1731.png 1731w,
            images/products-hero_n46h6h_c_scale,w_1920.png 1920w"
            src="products-hero_n46h6h_c_scale,w_1920.png"
            alt="Orbitz bottle in circle with the text 'shop' and an orange background"
            class="col-span-full"
            id="hero-image">

            <!-- Nested Grid Text -->
            <section id="nested-hero-grid" class="grid-con">
                <div class="col-span-full">
                    <h2>Daily Refreshments</h2>
                    <p>Check out our current deals and special offers!</p>
                    <div id="button">
                        <a href="#" >View Offers</a>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
